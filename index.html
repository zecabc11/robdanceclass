<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 ROB DANCE CLASS - Kpop Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: #000000;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 0, 0, 0.15) 0%, transparent 40%);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(255, 0, 0, 0.3);
            border: 2px solid #ff0000;
        }
        
        /* Header */
        header {
            background: #000000;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #ff0000;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .logo .rob {
            color: #ff0000;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
            font-size: 32px;
        }
        
        .logo .dance {
            color: white;
        }
        
        .logo .class {
            color: #ff0000;
            font-style: italic;
        }
        
        .admin-badge {
            background: #ff0000;
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .admin-badge:hover {
            transform: scale(1.05);
            background: #cc0000;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1a1a1a;
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #ff0000;
        }
        
        .user-info span {
            color: white;
        }
        
        .user-name {
            color: #ff0000 !important;
            font-weight: bold;
        }
        
        .avatar {
            width: 38px;
            height: 38px;
            background: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 18px;
        }
        
        /* Main layout */
        .main-content {
            display: flex;
            min-height: 600px;
        }
        
        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #000000;
            padding: 25px 20px;
            border-right: 3px solid #ff0000;
        }
        
        .sidebar h3 {
            color: #ff0000;
            margin-bottom: 20px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #ff0000;
            padding-bottom: 10px;
        }
        
        .progress-section {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid #ff0000;
        }
        
        .progress-section p {
            color: white;
            margin-bottom: 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        
        .progress-percent {
            color: #ff0000;
            font-size: 24px;
            font-weight: 900;
        }
        
        .progress-bar {
            width: 100%;
            height: 15px;
            background: #333;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
            border: 1px solid #ff0000;
        }
        
        .progress-fill {
            height: 100%;
            background: #ff0000;
            border-radius: 10px;
            transition: width 0.3s;
        }
        
        .modulo-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .modulo-btn {
            background: #1a1a1a;
            border: 2px solid #ff0000;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modulo-btn:hover {
            background: #ff0000;
            transform: translateX(5px);
        }
        
        .modulo-btn.active {
            background: #ff0000;
        }
        
        .modulo-btn .arrow {
            font-size: 20px;
            transition: transform 0.3s;
        }
        
        .modulo-btn.active .arrow {
            transform: rotate(90deg);
        }
        
        .aulas-container {
            margin-top: 15px;
            margin-bottom: 20px;
            display: none;
        }
        
        .aulas-container.show {
            display: block;
        }
        
        .aula-item {
            background: #222;
            color: white;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }
        
        .aula-item:hover {
            border-left-color: #ff0000;
            background: #2a2a2a;
            transform: translateX(5px);
        }
        
        .aula-item.active {
            border-left-color: #ff0000;
            background: #ff0000;
        }
        
        .aula-item.completed {
            border-left-color: #00ff00;
        }
        
        .aula-item.completed::after {
            content: "✓";
            color: #00ff00;
            margin-left: 10px;
            float: right;
        }
        
        /* Video area */
        .video-section {
            flex: 1;
            padding: 25px;
            background: #f5f5f5;
        }
        
        .video-container {
            background: #000000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 25px;
            position: relative;
            padding-top: 56.25%;
            border: 3px solid #ff0000;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.2);
        }
        
        .video-container iframe,
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-info {
            margin-bottom: 25px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid #ff0000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .video-title {
            font-size: 26px;
            color: #000000;
            margin-bottom: 10px;
            font-weight: 900;
        }
        
        .video-title span {
            color: #ff0000;
        }
        
        .video-meta {
            display: flex;
            gap: 20px;
            color: #666;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin: 25px 0;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
        }
        
        .btn-primary {
            background: #ff0000;
            color: white;
            border: 2px solid #ff0000;
        }
        
        .btn-primary:hover {
            background: #cc0000;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }
        
        .btn-secondary {
            background: #000000;
            color: white;
            border: 2px solid #ff0000;
        }
        
        .btn-secondary:hover {
            background: #1a1a1a;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }
        
        /* Comments Section */
        .comments-section {
            margin-top: 30px;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 1px solid #ff0000;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #ff0000;
            padding-bottom: 10px;
        }
        
        .section-header h3 {
            color: #000000;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .section-header span {
            background: #ff0000;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .comment-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }
        
        .comment-item {
            background: #f8f8f8;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #ff0000;
        }
        
        .comment-author {
            font-weight: 900;
            color: #000000;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }
        
        .comment-text {
            color: #333;
            line-height: 1.5;
            margin-bottom: 8px;
            font-size: 15px;
        }
        
        .comment-time {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            text-align: right;
        }
        
        .input-area {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .input-area input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 15px;
        }
        
        .input-area input:focus {
            border-color: #ff0000;
        }
        
        .send-btn {
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 0 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            border: 2px solid #ff0000;
        }
        
        .send-btn:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
        
        /* Admin Panel (escondido das alunas) */
        .admin-panel {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 2px solid #ff0000;
        }
        
        .admin-panel h3 {
            color: #ff0000;
            margin-bottom: 20px;
            font-size: 20px;
            text-transform: uppercase;
        }
        
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .admin-form select,
        .admin-form input {
            padding: 12px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #000;
            color: white;
            font-size: 16px;
        }
        
        .admin-form select option {
            background: #000;
            color: white;
        }
        
        .admin-form button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .admin-form button:hover {
            background: #cc0000;
            transform: scale(1.02);
        }
        
        .admin-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .admin-aula-item {
            background: #000;
            color: white;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #ff0000;
        }
        
        .admin-delete {
            background: #ff0000;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
        
        /* Modal de login admin */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #ff0000;
            width: 400px;
        }
        
        .modal-content h2 {
            color: #ff0000;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .modal-content input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #000;
            color: white;
        }
        
        .modal-content button {
            width: 100%;
            padding: 15px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        
        @media (max-width: 1024px) {
            .main-content {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- MODAL DE LOGIN ADMIN (só aparece quando clicar no botão) -->
    <div id="adminModal" class="modal hidden">
        <div class="modal-content">
            <h2>🔐 ÁREA DA PROFESSORA</h2>
            <input type="password" id="adminPassword" placeholder="Digite a senha">
            <button onclick="loginAdmin()">ENTRAR</button>
            <p style="color: #666; text-align: center; margin-top: 15px;">Senha: rob2024</p>
        </div>
    </div>
    
    <!-- PAINEL ADMIN (aparece só depois do login) -->
    <div id="adminPanel" class="hidden">
        <div class="admin-panel">
            <h3>➕ ADICIONAR NOVA AULA</h3>
            <div class="admin-form">
                <select id="moduloSelect">
                    <option value="1">MÓDULO 1 - BLACKPINK</option>
                    <option value="2">MÓDULO 2 - TWICE</option>
                    <option value="3">MÓDULO 3 - BTS</option>
                </select>
                <input type="text" id="aulaNome" placeholder="Nome da aula (ex: KILL THIS LOVE)">
                <input type="text" id="aulaLink" placeholder="Link do vídeo (opcional)">
                <button onclick="adicionarAula()">ADICIONAR AULA</button>
            </div>
            
            <h3 style="margin-top: 20px;">📋 AULAS CADASTRADAS</h3>
            <div class="admin-list" id="adminAulasList"></div>
        </div>
    </div>
    
    <div class="container">
        <header>
            <div class="logo">
                <span class="rob">ROB</span>
                <span class="dance">DANCE</span>
                <span class="class">CLASS</span>
            </div>
            
            <!-- BOTÃO PARA ABRIR PAINEL ADMIN -->
            <div class="admin-badge" onclick="abrirAdmin()">👑 PROFESSORA</div>
            
            <div class="user-info">
                <span>Olá, <span id="nomeUsuario" class="user-name">Aluna</span></span>
                <div class="avatar" id="userAvatar">A</div>
            </div>
        </header>
        
        <div class="main-content">
            <!-- Sidebar com módulos -->
            <div class="sidebar">
                <h3>🔥 MÓDULOS</h3>
                
                <div class="progress-section">
                    <p>
                        <span>Progresso</span>
                        <span class="progress-percent" id="progressPercent">0%</span>
                    </p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
                
                <div class="modulo-buttons" id="modulosContainer">
                    <!-- Os módulos serão carregados aqui pelo JavaScript -->
                </div>
            </div>
            
            <!-- Área de vídeo -->
            <div class="video-section">
                <div class="video-container">
                    <iframe id="videoPlayer" src="" style="display: none;"></iframe>
                    <div id="videoPlaceholder" style="color: white; text-align: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
                        <h3>🎥 Selecione uma aula</h3>
                    </div>
                </div>
                
                <div class="video-info">
                    <h2 class="video-title" id="videoTitle"><span>🔥</span> Selecione uma aula para começar</h2>
                    <div class="video-meta">
                        <span><i>📅</i> Clique em uma aula ao lado</span>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="marcarConcluido()">✓ MARCAR COMO CONCLUÍDO</button>
                    <button class="btn btn-secondary" onclick="salvarAula()">❤️ SALVAR AULA</button>
                </div>
                
                <!-- Comentários -->
                <div class="comments-section">
                    <div class="section-header">
                        <h3>💬 COMENTÁRIOS</h3>
                        <span id="comentariosCount">6</span>
                    </div>
                    
                    <div class="comment-list" id="commentList">
                        <div class="comment-item">
                            <div class="comment-author">👤 Ana Silva</div>
                            <div class="comment-text">Adorei as aulas!</div>
                            <div class="comment-time">há 2 horas</div>
                        </div>
                    </div>
                    
                    <div class="input-area">
                        <input type="text" id="commentInput" placeholder="Escreva seu comentário...">
                        <button class="send-btn" onclick="enviarComentario()">ENVIAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // SENHA DO ADMIN
        const SENHA_ADMIN = "rob2024";
        
        // DADOS DAS AULAS
        let aulas = [
            { modulo: 1, nome: "BOOMBAYAH", link: "" },
            { modulo: 1, nome: "HOW YOU LIKE THAT", link: "" },
            { modulo: 1, nome: "LOVESICK GIRLS", link: "" },
            { modulo: 2, nome: "T.T", link: "" },
            { modulo: 2, nome: "CHEER UP", link: "" },
            { modulo: 2, nome: "FANCY", link: "" },
            { modulo: 3, nome: "ANPANMAN", link: "" },
            { modulo: 3, nome: "DYNAMITE", link: "" },
            { modulo: 3, nome: "BUTTER", link: "" }
        ];
        
        // NOMES DOS MÓDULOS
        const nomesModulos = {
            1: "BLACKPINK",
            2: "TWICE",
            3: "BTS"
        };
        
        // Progresso da aluna
        let aulasConcluidas = [];
        let nomeAluna = "Aluna";
        
        // ========== FUNÇÕES DO ADMIN ==========
        
        function abrirAdmin() {
            document.getElementById('adminModal').classList.remove('hidden');
        }
        
        function loginAdmin() {
            let senha = document.getElementById('adminPassword').value;
            
            if (senha === SENHA_ADMIN) {
                document.getElementById('adminModal').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                atualizarAdminLista();
            } else {
                alert('Senha incorreta! Tente: rob2024');
            }
        }
        
        function adicionarAula() {
            let modulo = document.getElementById('moduloSelect').value;
            let nome = document.getElementById('aulaNome').value.trim();
            let link = document.getElementById('aulaLink').value.trim();
            
            if (nome === '') {
                alert('Digite o nome da aula!');
                return;
            }
            
            aulas.push({
                modulo: parseInt(modulo),
                nome: nome,
                link: link
            });
            
            document.getElementById('aulaNome').value = '';
            document.getElementById('aulaLink').value = '';
            
            atualizarAdminLista();
            carregarModulos(); // Atualiza o site das alunas na hora!
            
            alert('✅ Aula adicionada com sucesso!');
        }
        
        function removerAula(index) {
            if (confirm('Remover esta aula?')) {
                aulas.splice(index, 1);
                atualizarAdminLista();
                carregarModulos(); // Atualiza o site das alunas na hora!
            }
        }
        
        function atualizarAdminLista() {
            let html = '';
            
            aulas.forEach((aula, index) => {
                html += `
                    <div class="admin-aula-item">
                        <span>M${aula.modulo} - ${aula.nome}</span>
                        <button class="admin-delete" onclick="removerAula(${index})">🗑️</button>
                    </div>
                `;
            });
            
            document.getElementById('adminAulasList').innerHTML = html;
        }
        
        // ========== FUNÇÕES DO SITE (ALUNAS) ==========
        
        function carregarModulos() {
            let html = '';
            
            for (let m = 1; m <= 3; m++) {
                let aulasModulo = aulas.filter(a => a.modulo === m);
                
                html += `
                    <div class="modulo-btn" onclick="toggleModulo(${m})" id="modulo${m}">
                        MÓDULO ${m} - ${nomesModulos[m]}
                        <span class="arrow">▶</span>
                    </div>
                    <div class="aulas-container" id="aulasModulo${m}">
                `;
                
                aulasModulo.forEach(aula => {
                    html += `
                        <div class="aula-item" onclick="selecionarAula(this, '${aula.link || ''}')">
                            🎵 ${aula.nome}
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            document.getElementById('modulosContainer').innerHTML = html;
        }
        
        function toggleModulo(numero) {
            let container = document.getElementById('aulasModulo' + numero);
            let botao = document.getElementById('modulo' + numero);
            
            container.classList.toggle('show');
            botao.classList.toggle('active');
        }
        
        function selecionarAula(elemento, link) {
            document.querySelectorAll('.aula-item').forEach(item => {
                item.classList.remove('active');
            });
            
            elemento.classList.add('active');
            
            let nomeAula = elemento.textContent.replace('🎵 ', '');
            document.getElementById('videoTitle').innerHTML = `<span>🔥</span> ${nomeAula}`;
            
            if (link) {
                document.getElementById('videoPlayer').src = link;
                document.getElementById('videoPlayer').style.display = 'block';
                document.getElementById('videoPlaceholder').style.display = 'none';
            } else {
                document.getElementById('videoPlayer').style.display = 'none';
                document.getElementById('videoPlaceholder').style.display = 'block';
            }
        }
        
        function marcarConcluido() {
            let aulaAtiva = document.querySelector('.aula-item.active');
            
            if (!aulaAtiva) {
                alert('Selecione uma aula primeiro!');
                return;
            }
            
            if (!aulaAtiva.classList.contains('completed')) {
                aulaAtiva.classList.add('completed');
                aulasConcluidas.push(aulaAtiva.textContent);
                atualizarProgresso();
                alert('🎉 Aula concluída!');
            }
        }
        
        function atualizarProgresso() {
            let total = document.querySelectorAll('.aula-item').length;
            let percentual = Math.round((aulasConcluidas.length / total) * 100) || 0;
            
            document.getElementById('progressFill').style.width = percentual + '%';
            document.getElementById('progressPercent').textContent = percentual + '%';
        }
        
        function salvarAula() {
            alert('❤️ Aula salva!');
        }
        
        function enviarComentario() {
            let comment = document.getElementById('commentInput').value;
            
            if (comment.trim() !== '') {
                let commentList = document.getElementById('commentList');
                let newComment = document.createElement('div');
                newComment.className = 'comment-item';
                newComment.innerHTML = `
                    <div class="comment-author">👤 ${nomeAluna}</div>
                    <div class="comment-text">${comment}</div>
                    <div class="comment-time">agora mesmo</div>
                `;
                
                commentList.insertBefore(newComment, commentList.firstChild);
                document.getElementById('commentInput').value = '';
            }
        }
        
        // Inicializar
        window.onload = function() {
            carregarModulos();
            
            // Verificar se tem nome salvo
            let nome = localStorage.getItem('nomeAluna');
            if (nome) {
                nomeAluna = nome;
                document.getElementById('nomeUsuario').textContent = nome;
                document.getElementById('userAvatar').textContent = nome.charAt(0).toUpperCase();
            }
        }
    </script>
</body>
</html>
