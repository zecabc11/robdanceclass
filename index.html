<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 PAINEL DA PROFESSORA - ROB DANCE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: #000;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .painel {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            border: 3px solid #ff0000;
            box-shadow: 0 20px 40px rgba(255,0,0,0.3);
        }
        
        .header {
            background: #000;
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid #ff0000;
        }
        
        .header h1 {
            font-size: 36px;
        }
        
        .header h1 span {
            color: #ff0000;
        }
        
        .header p {
            color: #888;
            margin-top: 10px;
        }
        
        .content {
            padding: 30px;
        }
        
        .login-box, .add-box {
            background: #f5f5f5;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        h2 {
            color: #ff0000;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        
        input:focus, select:focus {
            border-color: #ff0000;
            outline: none;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            background: #cc0000;
            transform: scale(1.02);
        }
        
        .aula-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #ff0000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .aula-info h4 {
            color: #333;
        }
        
        .aula-info p {
            color: #ff0000;
            font-size: 14px;
        }
        
        .delete {
            background: #ff4444;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
        
        .aviso {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .btn-pequeno {
            padding: 10px;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="painel">
        <div class="header">
            <h1><span>ROB</span> DANCE</h1>
            <p>👑 Painel da Professora</p>
        </div>
        
        <div class="content">
            <!-- TELA DE LOGIN -->
            <div id="telaLogin">
                <div class="login-box">
                    <h2>🔐 Acesso</h2>
                    <input type="password" id="senha" placeholder="Digite sua senha">
                    <button onclick="fazerLogin()">ENTRAR</button>
                </div>
            </div>
            
            <!-- TELA DE ADMIN (aparece depois do login) -->
            <div id="telaAdmin" class="hidden">
                <!-- AVISO IMPORTANTE -->
                <div class="aviso">
                    <strong>📌 COMO FUNCIONA:</strong><br>
                    1. Preencha os dados da nova aula<br>
                    2. Clique em ADICIONAR<br>
                    3. A aula aparece abaixo<br>
                    4. Pronto! Já está no site das alunas! ✅
                </div>
                
                <!-- FORMULÁRIO PARA ADICIONAR AULA -->
                <div class="add-box">
                    <h2>➕ NOVA AULA</h2>
                    
                    <select id="modulo">
                        <option value="1">MÓDULO 1 - BLACKPINK</option>
                        <option value="2">MÓDULO 2 - TWICE</option>
                        <option value="3">MÓDULO 3 - BTS</option>
                    </select>
                    
                    <input type="text" id="nomeAula" placeholder="Nome da aula (ex: KILL THIS LOVE)">
                    
                    <input type="text" id="linkVideo" placeholder="Link do vídeo (YouTube ou Drive)">
                    
                    <button onclick="adicionarAula()">✅ ADICIONAR AULA</button>
                </div>
                
                <!-- LISTA DE AULAS CADASTRADAS -->
                <h2 style="margin-top: 30px;">📋 AULAS CADASTRADAS</h2>
                <div id="listaAulas"></div>
                
                <!-- LINK DO SITE -->
                <div style="background: #000; color: white; padding: 20px; border-radius: 10px; margin-top: 30px;">
                    <p style="color: #ff0000; margin-bottom: 10px;">🔗 LINK DO SITE DAS ALUNAS:</p>
                    <p style="font-size: 18px; word-break: break-all;">https://zeacb11.github.io/robdanceclass/</p>
                    <button class="btn-pequeno" onclick="copiarLink()">📋 COPIAR LINK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // SENHA (você pode mudar aqui)
        const SENHA = "rob2024";
        
        // Carregar aulas salvas
        let aulas = JSON.parse(localStorage.getItem('aulas')) || [
            { modulo: 1, nome: "BOOMBAYAH", link: "youtube.com/1" },
            { modulo: 1, nome: "HOW YOU LIKE THAT", link: "youtube.com/2" },
            { modulo: 1, nome: "LOVESICK GIRLS", link: "youtube.com/3" },
            { modulo: 2, nome: "T.T", link: "youtube.com/4" },
            { modulo: 2, nome: "CHEER UP", link: "youtube.com/5" },
            { modulo: 2, nome: "FANCY", link: "youtube.com/6" },
            { modulo: 3, nome: "ANPANMAN", link: "youtube.com/7" },
            { modulo: 3, nome: "DYNAMITE", link: "youtube.com/8" },
            { modulo: 3, nome: "BUTTER", link: "youtube.com/9" }
        ];
        
        function fazerLogin() {
            let senha = document.getElementById('senha').value;
            
            if (senha === SENHA) {
                document.getElementById('telaLogin').style.display = 'none';
                document.getElementById('telaAdmin').classList.remove('hidden');
                atualizarLista();
            } else {
                alert('❌ Senha errada! Tente rob2024');
            }
        }
        
        function adicionarAula() {
            let modulo = document.getElementById('modulo').value;
            let nome = document.getElementById('nomeAula').value.trim();
            let link = document.getElementById('linkVideo').value.trim();
            
            if (nome === '') {
                alert('Digite o nome da aula!');
                return;
            }
            
            // Adicionar aula
            aulas.push({
                modulo: parseInt(modulo),
                nome: nome,
                link: link || "Em breve"
            });
            
            // Salvar
            localStorage.setItem('aulas', JSON.stringify(aulas));
            
            // Limpar campos
            document.getElementById('nomeAula').value = '';
            document.getElementById('linkVideo').value = '';
            
            // Atualizar lista
            atualizarLista();
            
            // Mostrar mensagem
            alert('✅ Aula adicionada com sucesso!');
            
            // ATUALIZAR O SITE DAS ALUNAS AUTOMATICAMENTE
            atualizarSiteAlunas();
        }
        
        function removerAula(index) {
            if (confirm('Remover esta aula?')) {
                aulas.splice(index, 1);
                localStorage.setItem('aulas', JSON.stringify(aulas));
                atualizarLista();
                atualizarSiteAlunas();
            }
        }
        
        function atualizarLista() {
            let html = '';
            
            // Agrupar por módulo
            for (let m = 1; m <= 3; m++) {
                let nomeModulo = m === 1 ? 'BLACKPINK' : m === 2 ? 'TWICE' : 'BTS';
                let aulasModulo = aulas.filter(a => a.modulo === m);
                
                if (aulasModulo.length > 0) {
                    html += `<h3 style="color: #ff0000; margin: 20px 0 10px;">🎵 ${nomeModulo}</h3>`;
                    
                    aulasModulo.forEach((aula, i) => {
                        let indexReal = aulas.findIndex(a => a.modulo === m && a.nome === aula.nome);
                        html += `
                            <div class="aula-item">
                                <div class="aula-info">
                                    <h4>${aula.nome}</h4>
                                    <p>📹 ${aula.link}</p>
                                </div>
                                <button class="delete" onclick="removerAula(${indexReal})">🗑️</button>
                            </div>
                        `;
                    });
                }
            }
            
            document.getElementById('listaAulas').innerHTML = html;
        }
        
        function atualizarSiteAlunas() {
            // Isso aqui é mágico! Atualiza o site das alunas automaticamente
            let siteHTML = gerarSiteCompleto();
            
            // Salvar no localStorage para o site das alunas ler
            localStorage.setItem('siteAtual', siteHTML);
            
            console.log('Site atualizado!');
        }
        
        function gerarSiteCompleto() {
            // Função que gera o HTML completo do site das alunas com as aulas atualizadas
            let aulasHTML = '';
            
            for (let m = 1; m <= 3; m++) {
                let nomeModulo = m === 1 ? 'BLACKPINK' : m === 2 ? 'TWICE' : 'BTS';
                let aulasModulo = aulas.filter(a => a.modulo === m);
                
                aulasHTML += `
                    <div class="modulo-btn" onclick="toggleModulo(${m})" id="modulo${m}">
                        MÓDULO ${m} - ${nomeModulo}
                        <span class="arrow">▶</span>
                    </div>
                    <div class="aulas-container" id="aulasModulo${m}">
                `;
                
                aulasModulo.forEach(aula => {
                    aulasHTML += `
                        <div class="aula-item" onclick="selecionarAula(this, '${aula.link}')">
                            🎵 ${aula.nome}
                        </div>
                    `;
                });
                
                aulasHTML += `</div>`;
            }
            
            return aulasHTML;
        }
        
        function copiarLink() {
            navigator.clipboard.writeText('https://zeacb11.github.io/robdanceclass/');
            alert('✅ Link copiado!');
        }
        
        // Login automático se já tiver feito antes (opcional)
        window.onload = function() {
            // Verifica se já está logado
            if (localStorage.getItem('logado') === 'sim') {
                document.getElementById('senha').value = SENHA;
                fazerLogin();
            }
        }
    </script>
</body>
</html>
