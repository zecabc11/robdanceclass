<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 PAINEL DA PROFESSOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: #000000;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 0, 0, 0.15) 0%, transparent 40%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(255, 0, 0, 0.5);
            border: 3px solid #ff0000;
        }
        
        .header {
            background: #000000;
            color: white;
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid #ff0000;
        }
        
        .header h1 {
            font-size: 42px;
            letter-spacing: 3px;
        }
        
        .header h1 span {
            color: #ff0000;
        }
        
        .header p {
            color: #888;
            margin-top: 10px;
            font-size: 18px;
        }
        
        .content {
            padding: 30px;
        }
        
        .login-box, .add-box {
            background: #f5f5f5;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border-left: 5px solid #ff0000;
        }
        
        h2 {
            color: #ff0000;
            margin-bottom: 25px;
            font-size: 24px;
            text-transform: uppercase;
        }
        
        input, select {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }
        
        input:focus, select:focus {
            border-color: #ff0000;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            background: #cc0000;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
        }
        
        .aula-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #ff0000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .aula-info h4 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .aula-info p {
            color: #ff0000;
            font-size: 14px;
        }
        
        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .delete-btn:hover {
            background: #cc0000;
            transform: scale(1.1);
        }
        
        .hidden {
            display: none;
        }
        
        .aviso {
            background: #000;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 5px solid #ff0000;
        }
        
        .aviso a {
            color: #ff0000;
            text-decoration: none;
            font-weight: bold;
        }
        
        .success-message {
            background: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span>ROB</span> DANCE</h1>
            <p>👑 PAINEL DA PROFESSORA</p>
        </div>
        
        <div class="content">
            <!-- MENSAGEM DE SUCESSO -->
            <div id="successMessage" class="success-message">
                ✅ Aula adicionada com sucesso!
            </div>
            
            <!-- TELA DE LOGIN -->
            <div id="loginScreen">
                <div class="login-box">
                    <h2>🔐 ACESSO RESTRITO</h2>
                    <input type="password" id="password" placeholder="Digite sua senha">
                    <button onclick="login()">ENTRAR</button>
                    <p style="text-align: center; margin-top: 15px; color: #666;">Senha: <strong>rob2024</strong></p>
                </div>
            </div>
            
            <!-- TELA ADMIN (aparece depois do login) -->
            <div id="adminScreen" class="hidden">
                <div class="add-box">
                    <h2>➕ ADICIONAR NOVA AULA</h2>
                    
                    <select id="modulo">
                        <option value="1">MÓDULO 1 - BLACKPINK</option>
                        <option value="2">MÓDULO 2 - TWICE</option>
                        <option value="3">MÓDULO 3 - BTS</option>
                    </select>
                    
                    <input type="text" id="nomeAula" placeholder="Nome da aula (ex: KILL THIS LOVE)">
                    <input type="text" id="linkVideo" placeholder="Link do vídeo (YouTube ou Drive)">
                    
                    <button onclick="adicionarAula()">✅ ADICIONAR AULA</button>
                </div>
                
                <!-- LISTA DE AULAS -->
                <h2 style="margin-top: 30px;">📋 AULAS CADASTRADAS</h2>
                <div id="listaAulas"></div>
                
                <!-- LINK DO SITE -->
                <div class="aviso">
                    <p style="font-size: 18px; margin-bottom: 10px;">🔗 LINK DO SITE DAS ALUNAS:</p>
                    <p style="background: #1a1a1a; padding: 15px; border-radius: 8px; word-break: break-all;">
                        https://zeacb11.github.io/robdanceclass/
                    </p>
                    <button onclick="copiarLink()" style="margin-top: 15px; padding: 10px;">📋 COPIAR LINK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // SENHA
        const SENHA = "rob2024";
        
        // AULAS (já vem com as básicas)
        let aulas = JSON.parse(localStorage.getItem('aulas')) || [
            { modulo: 1, nome: "BOOMBAYAH", link: "" },
            { modulo: 1, nome: "HOW YOU LIKE THAT", link: "" },
            { modulo: 1, nome: "LOVESICK GIRLS", link: "" },
            { modulo: 2, nome: "T.T", link: "" },
            { modulo: 2, nome: "CHEER UP", link: "" },
            { modulo: 2, nome: "FANCY", link: "" },
            { modulo: 3, nome: "ANPANMAN", link: "" },
            { modulo: 3, nome: "DYNAMITE", link: "" },
            { modulo: 3, nome: "BUTTER", link: "" }
        ];
        
        // Nomes dos módulos
        const nomesModulos = {
            1: "BLACKPINK",
            2: "TWICE",
            3: "BTS"
        };
        
        function login() {
            let senha = document.getElementById('password').value;
            
            if (senha === SENHA) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminScreen').classList.remove('hidden');
                atualizarLista();
            } else {
                alert('❌ Senha incorreta! Tente: rob2024');
            }
        }
        
        function adicionarAula() {
            let modulo = document.getElementById('modulo').value;
            let nome = document.getElementById('nomeAula').value.trim();
            let link = document.getElementById('linkVideo').value.trim();
            
            if (nome === '') {
                alert('Digite o nome da aula!');
                return;
            }
            
            // Adicionar nova aula
            aulas.push({
                modulo: parseInt(modulo),
                nome: nome,
                link: link || "Em breve"
            });
            
            // Salvar no navegador
            localStorage.setItem('aulas', JSON.stringify(aulas));
            
            // Limpar campos
            document.getElementById('nomeAula').value = '';
            document.getElementById('linkVideo').value = '';
            
            // Mostrar mensagem de sucesso
            document.getElementById('successMessage').style.display = 'block';
            setTimeout(() => {
                document.getElementById('successMessage').style.display = 'none';
            }, 3000);
            
            // Atualizar lista
            atualizarLista();
        }
        
        function removerAula(index) {
            if (confirm('Tem certeza que quer remover esta aula?')) {
                aulas.splice(index, 1);
                localStorage.setItem('aulas', JSON.stringify(aulas));
                atualizarLista();
            }
        }
        
        function atualizarLista() {
            let html = '';
            
            // Mostrar aulas por módulo
            for (let m = 1; m <= 3; m++) {
                let aulasModulo = aulas.filter(a => a.modulo === m);
                
                if (aulasModulo.length > 0) {
                    html += `<h3 style="color: #ff0000; margin: 20px 0 10px;">🎵 MÓDULO ${m} - ${nomesModulos[m]}</h3>`;
                    
                    aulasModulo.forEach((aula, index) => {
                        // Encontrar o índice real no array principal
                        let indiceReal = aulas.findIndex(a => a.modulo === m && a.nome === aula.nome);
                        
                        html += `
                            <div class="aula-item">
                                <div class="aula-info">
                                    <h4>${aula.nome}</h4>
                                    <p>📹 ${aula.link || 'Link em breve'}</p>
                                </div>
                                <button class="delete-btn" onclick="removerAula(${indiceReal})">🗑️</button>
                            </div>
                        `;
                    });
                }
            }
            
            document.getElementById('listaAulas').innerHTML = html;
        }
        
        function copiarLink() {
            navigator.clipboard.writeText('https://zeacb11.github.io/robdanceclass/');
            alert('✅ Link copiado!');
        }
    </script>
</body>
</html>
